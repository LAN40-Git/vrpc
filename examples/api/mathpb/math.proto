syntax = "proto3";

message MathAddRequest {
  int64 augend = 1;
  int64 addend = 2;
}

message MathAddResponse {
  int64 result = 1;
}

message MathSubRequest {
  int64 minuend = 1;
  int64 subtrahend = 2;
}

message MathSubResponse {
  int64 result = 1;
}

service MathService {
  rpc Add(MathAddRequest) returns (MathAddResponse);
  rpc Sub(MathSubRequest) returns (MathSubResponse);
}